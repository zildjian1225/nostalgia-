<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Zildjian · Premium Developer</title>
  <style>
    /* ---------- GLOBAL RESET & BASE ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'SF Pro Display', system-ui, -apple-system, sans-serif;
      background: #050505;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      color: #ffffff;
      user-select: none;
    }

    /* main fullscreen container */
    .hero {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: radial-gradient(circle at 30% 40%, #1a0a00 0%, #050505 70%);
    }

    /* canvas for particle & light background */
    #backgroundCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* content layer */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      width: 90%;
      max-width: 1300px;
      gap: 3rem;
      flex-wrap: wrap;
    }

    /* left text block */
    .left-block {
      flex: 1 1 500px;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
      backdrop-filter: blur(12px);
      background: rgba(8, 8, 12, 0.5);
      border-radius: 3rem;
      padding: 2.5rem 2.8rem;
      border: 1px solid rgba(255, 122, 0, 0.25);
      box-shadow: 0 30px 50px rgba(0,0,0,0.8), 0 0 60px rgba(255, 122, 0, 0.2);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: rgba(255, 122, 0, 0.15);
      border: 1px solid rgba(255, 157, 47, 0.5);
      padding: 0.5rem 1.3rem;
      border-radius: 3rem;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #ffb87a;
      backdrop-filter: blur(8px);
      width: fit-content;
    }

    /* huge title */
    .main-title {
      font-size: clamp(3.8rem, 10vw, 6.5rem);
      font-weight: 800;
      line-height: 1.05;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff7a00 0%, #ffb347 50%, #ffd699 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 35px #ff7a00aa);
      position: relative;
      letter-spacing: -0.02em;
      animation: titleShine 3.5s infinite ease-in-out;
    }

    @keyframes titleShine {
      0%, 100% {
        filter: drop-shadow(0 0 25px #ff7a00cc);
      }
      50% {
        filter: drop-shadow(0 0 50px #ff9d2f);
      }
    }

    /* rotating subtitle */
    .rotating-text {
      font-size: 1.7rem;
      font-weight: 600;
      color: #ffb87a;
      text-shadow: 0 0 15px #ff7a00;
      min-height: 2.5rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      letter-spacing: 0.02em;
    }

    .cursor-blink {
      display: inline-block;
      width: 3px;
      height: 2rem;
      background: #ff9d2f;
      margin-left: 0.2rem;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 12px #ff7a00;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* typing line */
    .typing-line {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 1.1rem;
      background: rgba(0,0,0,0.5);
      padding: 0.7rem 1.2rem;
      border-radius: 2rem;
      border-left: 4px solid #ff7a00;
      color: #ffc48b;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* buttons */
    .button-group {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.9rem 2.2rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.04em;
      background: rgba(20, 20, 24, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 122, 0, 0.6);
      color: #fff;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 10px 25px -8px rgba(255, 122, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn.primary {
      background: #ff7a00;
      border: 1px solid #ff9d2f;
      color: #000;
      font-weight: 700;
      box-shadow: 0 0 30px #ff7a00aa;
    }

    .btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 35px #ff7a00;
      border-color: #ffb347;
    }

    /* skill chips */
    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-top: 0.4rem;
    }

    .chip {
      background: rgba(255, 122, 0, 0.1);
      border: 1px solid rgba(255, 157, 47, 0.5);
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #ffc285;
      backdrop-filter: blur(6px);
      transition: 0.2s;
    }

    .chip:hover {
      background: #ff7a00;
      color: #000;
      border-color: #ff7a00;
      box-shadow: 0 0 18px #ff7a00;
    }

    /* right code panel */
    .code-panel {
      flex: 1 1 380px;
      background: rgba(8, 8, 14, 0.7);
      backdrop-filter: blur(18px);
      border-radius: 2.5rem;
      border: 1px solid rgba(255, 122, 0, 0.4);
      padding: 1.8rem;
      box-shadow: 0 30px 50px rgba(0,0,0,0.8), 0 0 55px #ff7a0033;
      font-family: 'Fira Code', monospace;
      font-size: 0.85rem;
      color: #ddd;
      max-height: 480px;
      overflow: hidden;
      position: relative;
    }

    .code-content {
      white-space: pre-wrap;
      line-height: 1.6;
      color: #b0b0b0;
      text-shadow: 0 0 8px rgba(255,122,0,0.3);
    }

    .code-content .keyword { color: #ff7a00; }
    .code-content .string { color: #fbbf24; }
    .code-content .func { color: #ffb347; }

    @media (max-width: 850px) {
      .content {
        flex-direction: column;
        gap: 2rem;
      }
      .left-block, .code-panel {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <canvas id="backgroundCanvas"></canvas>

    <div class="content">
      <!-- left side -->
      <div class="left-block">
        <div class="badge">👋 HELLO, I'M</div>
        <h1 class="main-title">ZILDJIAN</h1>
        <div class="rotating-text" id="rotatingSubtitle"></div>
        <div class="typing-line" id="typingText"></div>

        <div class="button-group">
          <button class="btn primary" id="exploreBtn">Explore Portfolio</button>
          <button class="btn" id="contactBtn">Contact</button>
        </div>

        <div class="skills" id="skillsContainer"></div>
      </div>

      <!-- right code panel -->
      <div class="code-panel" id="codePanel">
        <div class="code-content" id="codeDisplay"></div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- BACKGROUND CANVAS (PARTICLES, GRID, LIGHT) ----------
      const canvas = document.getElementById('backgroundCanvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];
      let mouseX = 0.5, mouseY = 0.5;
      let targetMouseX = 0.5, targetMouseY = 0.5;

      function resizeCanvas() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        initParticles();
      }

      class Particle {
        constructor() {
          this.reset();
        }
        reset() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.radius = Math.random() * 2.2 + 0.8;
          this.baseAlpha = Math.random() * 0.5 + 0.15;
          this.speed = 0.2 + Math.random() * 0.5;
          this.angle = Math.random() * Math.PI * 2;
        }
        update(mx, my) {
          // gentle floating + parallax toward mouse
          this.angle += 0.008;
          this.x += Math.cos(this.angle) * 0.2;
          this.y += Math.sin(this.angle) * 0.2;
          // mouse influence
          const dx = (mx * width - this.x) * 0.0008;
          const dy = (my * height - this.y) * 0.0008;
          this.x += dx;
          this.y += dy;

          if (this.x < 0) this.x = width;
          if (this.x > width) this.x = 0;
          if (this.y < 0) this.y = height;
          if (this.y > height) this.y = 0;
        }
        draw(ctx) {
          ctx.fillStyle = `rgba(255, 140, 30, ${this.baseAlpha})`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
          ctx.fill();
          // glow
          ctx.fillStyle = `rgba(255, 160, 40, ${this.baseAlpha*0.6})`;
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius*2.2, 0, Math.PI*2);
          ctx.fill();
        }
      }

      function initParticles() {
        const count = Math.floor((width * height) / 5500);
        particles = Array.from({ length: count }, () => new Particle());
      }

      // animated grid & light rays
      function drawBackground(time) {
        ctx.clearRect(0, 0, width, height);

        // subtle animated gradient mesh
        const grad = ctx.createRadialGradient(width*0.3, height*0.35, 50, width*0.5, height*0.5, width*0.9);
        grad.addColorStop(0, 'rgba(255, 100, 0, 0.12)');
        grad.addColorStop(0.5, 'rgba(20, 8, 0, 0.25)');
        grad.addColorStop(1, '#050505');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, width, height);

        // moving light rays
        for (let i=0; i<4; i++) {
          const offset = (time*0.0002 + i*1.2) % 2;
          ctx.fillStyle = `rgba(255, 140, 20, 0.06)`;
          ctx.beginPath();
          ctx.moveTo(width*0.1, height*0.2);
          ctx.lineTo(width*0.9, height*0.1 + offset*150);
          ctx.lineTo(width*0.95, height*0.15 + offset*180);
          ctx.fill();
        }

        // glass blurry circles
        for (let i=0;i<3;i++) {
          const cx = width*(0.25 + i*0.25) + Math.sin(time*0.001+i)*20;
          const cy = height*(0.3 + i*0.15) + Math.cos(time*0.0008+i)*15;
          ctx.fillStyle = `rgba(255, 120, 30, 0.07)`;
          ctx.beginPath();
          ctx.arc(cx, cy, 120+Math.sin(time*0.002)*25, 0, Math.PI*2);
          ctx.fill();
        }

        // grid
        ctx.strokeStyle = 'rgba(255, 140, 30, 0.08)';
        ctx.lineWidth = 0.6;
        const gridSize = 70;
        for (let x = gridSize; x < width; x+=gridSize) {
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, height);
          ctx.stroke();
        }
        for (let y = gridSize; y < height; y+=gridSize) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(width, y);
          ctx.stroke();
        }

        // particles
        particles.forEach(p => {
          p.update(mouseX, mouseY);
          p.draw(ctx);
        });
      }

      // mouse interaction
      window.addEventListener('mousemove', (e) => {
        targetMouseX = e.clientX / window.innerWidth;
        targetMouseY = e.clientY / window.innerHeight;
      });
      window.addEventListener('touchmove', (e) => {
        if (e.touches.length) {
          targetMouseX = e.touches[0].clientX / window.innerWidth;
          targetMouseY = e.touches[0].clientY / window.innerHeight;
        }
      }, {passive: true});

      // ---------- TEXT ANIMATIONS ----------
      const subtitles = [
        "FULL STACK DEVELOPER",
        "WEB DEVELOPER",
        "AI DEVELOPER",
        "CYBER ENTHUSIAST"
      ];
      let subtitleIndex = 0;
      const rotatingEl = document.getElementById('rotatingSubtitle');

      function updateSubtitle() {
        rotatingEl.style.opacity = '0';
        setTimeout(() => {
          rotatingEl.textContent = subtitles[subtitleIndex];
          rotatingEl.style.opacity = '1';
          subtitleIndex = (subtitleIndex + 1) % subtitles.length;
        }, 300);
      }
      rotatingEl.style.transition = 'opacity 0.4s ease';
      updateSubtitle();
      setInterval(updateSubtitle, 3200);

      // typing effect
      const typingLines = [
        "Building Modern Websites...",
        "Creating AI Applications...",
        "Developing Automation...",
        "Designing Premium UI...",
        "Turning Ideas Into Reality..."
      ];
      let typeIndex = 0;
      let charIndex = 0;
      let currentText = '';
      const typingEl = document.getElementById('typingText');
      const cursorSpan = document.createElement('span');
      cursorSpan.className = 'cursor-blink';
      typingEl.appendChild(cursorSpan);

      function typeWriter() {
        if (charIndex < typingLines[typeIndex].length) {
          currentText += typingLines[typeIndex].charAt(charIndex);
          typingEl.childNodes[0].textContent = currentText;
          charIndex++;
          setTimeout(typeWriter, 50);
        } else {
          setTimeout(eraseText, 1800);
        }
      }

      function eraseText() {
        if (charIndex > 0) {
          currentText = currentText.slice(0, -1);
          typingEl.childNodes[0].textContent = currentText;
          charIndex--;
          setTimeout(eraseText, 25);
        } else {
          typeIndex = (typeIndex + 1) % typingLines.length;
          setTimeout(typeWriter, 350);
        }
      }

      typingEl.insertBefore(document.createTextNode(''), cursorSpan);
      typeWriter();

      // ---------- SKILLS CHIPS ----------
      const skills = ["HTML","CSS","JavaScript","Node.js","React","Python","API","AI","Linux","Cyber Security"];
      const skillsContainer = document.getElementById('skillsContainer');
      skills.forEach(skill => {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.textContent = skill;
        skillsContainer.appendChild(chip);
      });

      // ---------- CODE PANEL FAKE TYPING ----------
      const codeDisplay = document.getElementById('codeDisplay');
      const codeSnippets = [
        `const <span class="keyword">future</span> = <span class="func">buildAI</span>();\n<span class="keyword">await</span> <span class="func">deploy</span>(<span class="string">'cyber'</span>);`,
        `<span class="keyword">class</span> <span class="func">Developer</span> {\n  <span class="func">constructor</span>() {\n    this.stack = <span class="string">'full'</span>;\n  }\n}`,
        `<span class="keyword">import</span> { <span class="func">creativity</span> } <span class="keyword">from</span> <span class="string">'mind'</span>;`,
      ];
      let codeIdx = 0;
      function updateCodePanel() {
        codeDisplay.innerHTML = codeSnippets[codeIdx] + '<span class="cursor-blink" style="display:inline-block; width:8px; height:1.2rem;"></span>';
        codeIdx = (codeIdx+1) % codeSnippets.length;
      }
      updateCodePanel();
      setInterval(updateCodePanel, 3800);

      // ---------- BUTTON MAGNETIC / RIPPLE ----------
      document.querySelectorAll('.btn').forEach(btn => {
        btn.addEventListener('mousemove', (e) => {
          const rect = btn.getBoundingClientRect();
          const x = e.clientX - rect.left - rect.width/2;
          const y = e.clientY - rect.top - rect.height/2;
          btn.style.transform = `translate(${x*0.2}px, ${y*0.2}px) scale(1.05)`;
        });
        btn.addEventListener('mouseleave', () => {
          btn.style.transform = '';
        });
        btn.addEventListener('click', function(e) {
          const ripple = document.createElement('span');
          ripple.style.position = 'absolute';
          ripple.style.borderRadius = '50%';
          ripple.style.background = 'rgba(255,255,255,0.5)';
          ripple.style.width = '20px';
          ripple.style.height = '20px';
          ripple.style.left = `${e.clientX - this.getBoundingClientRect().left -10}px`;
          ripple.style.top = `${e.clientY - this.getBoundingClientRect().top -10}px`;
          ripple.style.animation = 'ripple 0.6s ease-out forwards';
          this.appendChild(ripple);
          setTimeout(() => ripple.remove(), 600);
        });
      });

      // add ripple keyframes dynamically
      const styleSheet = document.createElement("style");
      styleSheet.textContent = `
        @keyframes ripple {
          to { transform: scale(8); opacity: 0; }
        }
        .btn { position: relative; overflow: hidden; }
      `;
      document.head.appendChild(styleSheet);

      // ---------- ANIMATION LOOP ----------
      function animate(time) {
        // smooth mouse interpolation
        mouseX += (targetMouseX - mouseX) * 0.06;
        mouseY += (targetMouseY - mouseY) * 0.06;

        drawBackground(time);
        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
